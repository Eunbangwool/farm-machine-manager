# ===================================================================
# Farm Machine Manager - 자동 APK 빌드 (최적화 버전)
# ===================================================================

name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# 새 push가 들어오면 이전 빌드 자동 취소 (시간 낭비 방지)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 설정 (빌드 캐시 + Gradle 홈 캐시)
        uses: gradle/actions/setup-gradle@v3

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: APK 빌드 (병렬 + 캐시 + 린트 스킵)
        run: ./gradlew assembleDebug --parallel --build-cache -x lint

      - name: 빌드 정보 수집
        id: info
        run: |
          echo "date=$(date '+%Y-%m-%d %H:%M' )" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: 최신 빌드 Release 업데이트
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "📱 최신 빌드"
          body: |
            **자동 빌드된 디버그 APK**

            ## 📲 폰에서 직접 설치
            아래 Assets의 `app-debug.apk` 탭하여 다운로드.

            ## 🔖 빌드 정보
            - 일시: `${{ steps.info.outputs.date }} UTC`
            - 커밋: `${{ steps.info.outputs.sha }}`

            ## 🔗 폰 북마크용 직접 설치 URL
            https://github.com/${{ github.repository }}/releases/latest/download/app-debug.apk
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
          make_latest: "true"

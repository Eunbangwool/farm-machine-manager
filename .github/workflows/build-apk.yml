# ===================================================================
# Farm Machine Manager - 자동 APK 빌드
# ===================================================================
# 빌드 실패 시에도 로그 마지막 200줄을 release body 와 artifact 로 노출.
# 컴파일 에러를 외부에서 진단 가능하게 한다.

name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 설정 (캐시 일시 비활성)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      # 운영 APK (FarmManager.apk) → IS_DEBUG_APP=false, app_name "농돌이"
      # 디버그 APK (FarmManager-debug.apk) → IS_DEBUG_APP=true, app_name "농돌이 디버그",
      #                                        applicationId .debug suffix 라 운영과 동시 설치 가능
      - name: APK 빌드 (운영 + 디버그)
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo '=== 운영 APK 빌드 ==='
            ./gradlew assembleDebug --parallel -x lint
            cp app/build/outputs/apk/debug/app-debug.apk FarmManager.apk
            echo '=== 디버그 APK 빌드 (clean + -PdebugBuild=true) ==='
            ./gradlew clean assembleDebug -PdebugBuild=true --parallel -x lint
            cp app/build/outputs/apk/debug/app-debug.apk FarmManager-debug.apk
          } 2>&1 | tee build.log

      - name: 빌드 로그 (tail 200) GITHUB_STEP_SUMMARY 에 출력
        if: always()
        run: |
          echo '## Build log tail' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 빌드 로그를 artifact 로 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          retention-days: 14

      - name: 빌드 실패 시 release 본문에 로그 마지막 200줄 첨부
        if: steps.build.outcome != 'success'
        run: |
          {
            echo '**❌ 빌드 실패 — 컴파일 로그 (tail 200)**'
            echo
            echo '## 빌드 정보'
            echo "- 커밋: \`${GITHUB_SHA::7}\`"
            echo "- 빌드 번호: \`${{ github.run_number }}\`"
            echo "- 일시: \`$(date '+%Y-%m-%d %H:%M') UTC\`"
            echo
            echo '## 로그'
            echo '```'
            tail -200 build.log
            echo '```'
          } > release_body.md

      - name: 빌드 성공 시 release body 작성
        if: steps.build.outcome == 'success'
        run: |
          REPO="${{ github.repository }}"
          {
            echo '**자동 빌드된 농돌이 APK**'
            echo
            echo '## 📲 폰에서 직접 설치'
            echo "- 운영 앱: [FarmManager.apk](https://github.com/$REPO/releases/latest/download/FarmManager.apk) — 일반 사용자용"
            echo "- 디버그 앱: [FarmManager-debug.apk](https://github.com/$REPO/releases/latest/download/FarmManager-debug.apk) — 진단/등급 카드 노출, applicationId .debug suffix 라 운영과 동시 설치 가능"
            echo
            echo '## 🔖 빌드 정보'
            echo "- 일시: \`$(date '+%Y-%m-%d %H:%M') UTC\`"
            echo "- 커밋: \`${GITHUB_SHA::7}\`"
            echo "- 빌드 번호: \`${{ github.run_number }}\`"
            echo
            echo '## 🔗 폰 북마크용 직접 설치 URL'
            echo "- 운영: https://github.com/$REPO/releases/latest/download/FarmManager.apk"
            echo "- 디버그: https://github.com/$REPO/releases/latest/download/FarmManager-debug.apk"
          } > release_body.md

      - name: 최신 빌드 Release 업데이트
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "📱 최신 빌드"
          body_path: release_body.md
          files: |
            FarmManager.apk
            FarmManager-debug.apk
            build.log
          prerelease: false
          make_latest: "true"
          fail_on_unmatched_files: false

      - name: 빌드 실패면 워크플로우도 실패로 마감
        if: steps.build.outcome != 'success'
        run: |
          echo "Build failed — see release_body.md or build-log artifact."
          exit 1
